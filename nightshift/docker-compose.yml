version: "3.9"

services:
  # ── Data Layer ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maxx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maxx_secret}
      POSTGRES_DB: ${POSTGRES_DB:-maxx_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maxx"]
      interval: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks: [internal]

  # ── Control Plane ─────────────────────────────────
  hermes-api:
    build: ./apps/hermes-api
    env_file: .env
    ports:
      - "${API_PORT:-8642}:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - workspaces:/data/workspaces
      - artifacts:/data/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      retries: 3
    networks: [internal, public]

  # ── LLM Proxy ────────────────────────────────────
  provider-router:
    build: ./apps/provider-router
    env_file: .env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      retries: 3
    networks: [internal]

  # ── Workers ──────────────────────────────────────
  worker-coder:
    build: ./apps/worker-coder
    env_file: .env
    depends_on:
      hermes-api: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - workspaces:/data/workspaces
      - artifacts:/data/artifacts
    networks: [internal]

  worker-browser:
    build: ./apps/worker-browser
    env_file: .env
    depends_on:
      hermes-api: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - artifacts:/data/artifacts
      - browser_profiles:/data/browser_profiles
    shm_size: "2gb"
    networks: [internal]

  # ── Dashboard ────────────────────────────────────
  hermes-dashboard:
    build: ./apps/hermes-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    networks: [public]

  # ── Support Services ─────────────────────────────
  notifier:
    build: ./apps/notifier
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    networks: [internal]

  scheduler:
    build: ./apps/scheduler
    env_file: .env
    depends_on:
      hermes-api: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]

  # ── Reverse Proxy ────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - hermes-api
      - hermes-dashboard
    networks: [internal, public]

volumes:
  pgdata:
  redisdata:
  workspaces:
  artifacts:
  browser_profiles:
  caddydata:
  caddyconfig:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
