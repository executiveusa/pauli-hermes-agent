# Agent Registry
# Defines all agents in the Pauli Studio ecosystem.
# Read by the dashboard (GET /v1/agents) and orchestration mode.

agents:
  - name: hermes
    display_name: Hermes
    role: Business orchestrator — coding, research, deployment, multi-agent coordination
    endpoint: http://localhost:8642
    port: 8642
    type: hermes
    status: active
    capabilities:
      - coding
      - research
      - deployment
      - web_search
      - browser_automation
      - file_management
      - terminal
      - delegation

  - name: agent-zero
    display_name: Agent Zero
    role: Personal assistant — second brain, mental models, life management
