# ============================================================
# Hermes Agent — VPS Docker Compose Stack
# ============================================================
# Services:
#   hermes    — core agent + gateway (API, Telegram, Discord, etc.)
#   dashboard — voice control web UI (served on port 3000)
#   nginx     — reverse proxy (HTTPS termination + routing)
#
# Usage:
#   cp .env.vps.example .env
#   docker compose up -d
# ============================================================

services:

  # ── Hermes Agent Core ────────────────────────────────────
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    env_file: .env
    environment:
      # Enable the OpenAI-compatible API server adapter
      - API_SERVER_ENABLED=1
      # API server listens on all interfaces inside the container
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      # Set allowed CORS origins (your dashboard domain)
      - API_SERVER_CORS_ORIGINS=${DASHBOARD_ORIGIN:-http://31.220.58.212:9000}
      # Agent working directory inside container
      - MESSAGING_CWD=/workspace
    volumes:
      # Persist Hermes config & session data
      - hermes_home:/home/hermes/.hermes
      # Optional: mount a workspace for the agent to work in
      - workspace:/workspace
    ports:
      # Exposed directly — Coolify manages SSL/routing
      - "8642:8642"
    networks:
      - hermes_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8642/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Voice Control Dashboard ───────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: hermes-dashboard
    restart: unless-stopped
    volumes:
      - ./web-ui:/usr/share/nginx/html:ro
    ports:
      # Port 9000 — avoids conflict with Supabase Studio (3001), existing services (3000)
      - "9000:80"
    networks:
      - hermes_net
    depends_on:
      - hermes

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/hermes.conf:/etc/nginx/conf.d/hermes.conf:ro
      # SSL certificates (Let's Encrypt / Coolify manages these)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - hermes_net
    depends_on:
      - hermes
      - dashboard

  # ── Agent Zero — Personal Second Brain (port 8643) ───────
  # Opt-in: start with `docker compose up -d agent-zero`
  # Requires .env.agent-zero (copy from .env, set AGENT_ZERO_PERSONA)
  agent-zero:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:latest
    container_name: agent-zero
    restart: unless-stopped
    env_file: .env.agent-zero
    environment:
      - API_SERVER_ENABLED=1
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8643
      - API_SERVER_CORS_ORIGINS=${DASHBOARD_ORIGIN:-http://31.220.58.212:9000},https://pauli-hermes-agent.vercel.app
      - MESSAGING_CWD=/workspace
      - HERMES_HOME=/home/agent-zero/.hermes
      # Second brain — Bambu personal context
      - AGENT_PERSONA=agent-zero
    volumes:
      - agent_zero_home:/home/agent-zero/.hermes
      - workspace:/workspace
    ports:
      - "8643:8643"
    networks:
      - hermes_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8643/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  hermes_home:
    driver: local
  agent_zero_home:
    driver: local
  workspace:
    driver: local
  nginx_logs:
    driver: local

networks:
  hermes_net:
    driver: bridge
