# ============================================================
# Hermes Agent — Nginx Reverse Proxy Configuration
# ============================================================
# Replace YOUR_DOMAIN with your actual domain (e.g. hermes.yourdomain.com)
# SSL is assumed to be managed by Coolify / certbot.
#
# Routes:
#   /api/      → Hermes API server (port 8642)
#   /          → Voice control dashboard (port 3000)
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL (managed by Coolify / certbot) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "no-referrer" always;

    # ── Hermes API server (/api/ → :8642) ───────────────────
    location /api/ {
        # Strip /api prefix before forwarding
        rewrite ^/api/(.*) /$1 break;

        proxy_pass         http://hermes:8642;
        proxy_http_version 1.1;

        # Required for streaming (SSE / chunked)
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout for streaming agent responses
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 10s;

        # Disable buffering so SSE tokens arrive immediately
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # CORS is handled by Hermes; do not duplicate
    }

    # ── Voice Dashboard (/ → :3000) ─────────────────────────
    location / {
        proxy_pass         http://dashboard:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Logging ─────────────────────────────────────────────
    access_log /var/log/nginx/hermes.access.log;
    error_log  /var/log/nginx/hermes.error.log warn;
}
